services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autotube
      POSTGRES_PASSWORD: autotube
      POSTGRES_DB: autotube
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotube"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./secrets:/app/secrets:ro
      - media:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
      - ./secrets:/app/secrets:ro
      - media:/app/media
    command: celery -A app.workers.celery_app worker --beat --loglevel=info

  render:
    build: ./render
    ports:
      - "3001:3001"
    volumes:
      - ./render:/app
      - /app/node_modules
      - media:/app/media
    command: npm run serve

  web:
    build: ./web
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
  miniodata:
  media:
